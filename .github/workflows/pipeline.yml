name: video2article Pipeline

on:
  workflow_dispatch:
    inputs:
      url:
        description: "视频 URL"
        required: true
      tier:
        description: "模型档位"
        default: "fast"
        type: choice
        options:
          - fast
          - best
          - top
      simple:
        description: "快速模式（一步到位）"
        default: false
        type: boolean

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # STT 兜底需要 faster-whisper 模型，缓存避免重复下载
      - name: Cache faster-whisper models
        uses: actions/cache@v4
        with:
          path: models/whisper
          key: ${{ runner.os }}-faster-whisper-large-v3-turbo

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      # 如果没有字幕（走 STT 兜底），需要预下载 whisper 模型
      - name: Pre-download whisper model (for STT fallback)
        run: |
          mkdir -p models/whisper
          python -c "
from faster_whisper import WhisperModel
WhisperModel('large-v3-turbo', device='cpu', compute_type='int8', download_root='models/whisper')
          "

      # 让 faster-whisper 从缓存目录加载，而非 config.ini 里的 macOS 路径
      - name: Run pipeline
        env:
          WHISPER_MODEL_DIR: models/whisper
        run: |
          ARGS="${{ inputs.url }} --tier ${{ inputs.tier }}"
          if [[ "${{ inputs.simple }}" == "true" ]]; then
            ARGS="$ARGS --simple"
          fi
          python main.py article $ARGS

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
